<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Modern Product Card</title>
  </head>
  <body>
    <div class="container">
      <div class="card">

          <img src="public/imgCart.png" alt="Gaming Headphone" />

      </div>
    </div>
  </body>
</html>
